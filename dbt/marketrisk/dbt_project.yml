
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'marketrisk'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'marketrisk'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"       # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  marketrisk:
    # ── Silver layer ───────────────────────────────────────────────
    # INSERT OVERWRITE — full refresh on every run
    # Silver always recalculates from full Bronze history
    silver:
      +materialized: table
      +tags: ['silver']

    # ── Gold layer ─────────────────────────────────────────────────
    # incremental — MERGE on unique_key, accumulates history over time
    # Each Gold model declares its own unique_key in its config block
    gold:
      +materialized: incremental
      +tags: ['gold']
      +incremental_strategy: merge
      +on_schema_change: fail

seeds:
  marketrisk:
    stress_scenarios:
      +schema: bronze
      +column_types:
        scenario_name:          varchar(100)
        asset_class:            varchar(50)
        shock_pct:              double
        shock_bps:              double
        scenario_type:          varchar(20)
        is_stressed_var_proxy:  boolean
    ticker_classifications:
      +schema: bronze
      +column_types:
        ticker:     varchar(50)
        asset_class: varchar(100)
        geography: varchar(50)