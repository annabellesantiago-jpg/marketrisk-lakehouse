version: 2

models:

  - name: prices_cleaned
    description: >
      Deduplicated and cleaned daily market prices.
      One row per ticker per trading day.
      Weekends, holidays and null prices removed.
      Source: bronze.market_prices
    columns:
      - name: price_date
        description: Trading date — weekends and holidays excluded
        data_tests:
          - not_null
      - name: close_price
        description: Closing price in local currency — primary price for VaR calculations
        data_tests:
          - not_null
      - name: ticker
        description: Yahoo Finance ticker symbol
        data_tests:
          - not_null
      - name: open_price
        description: Opening price in local currency
        data_tests:
          - not_null
      - name: high_price
        description: Intraday high price in local currency
        data_tests:
          - not_null
      - name: low_price
        description: Intraday low price in local currency
        data_tests:
          - not_null
      - name: volume
        description: Daily trading volume. NULL for FX pairs — no volume data from Yahoo Finance.
      - name: fetched_at
        description: Timestamp when the price was fetched from Yahoo Finance (from bronze)
        data_tests:
          - not_null
      - name: _silver_loaded_at
        description: Timestamp when the row was loaded into Silver
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ticker
              - price_date

  - name: positions_enriched
    description: >
      Trading positions enriched with FX rates and latest market prices.
      All monetary values normalised to USD.
      One row per trade_id.
      Source: bronze.positions + bronze.fx_rates + silver.prices_cleaned
    columns:
      - name: trade_id
        description: Unique trade identifier — primary key
        data_tests:
          - not_null
          - unique
      - name: book_id
        description: sub-desk book identifier
        data_tests:
          - not_null
      - name: trader_id
        description: Unique trader identifier
        data_tests:
          - not_null          
      - name: counterparty
        description: Counterparty name
        data_tests:
          - not_null          
      - name: asset_class
        description: Asset class of the instrument
        data_tests:
          - not_null              
          - accepted_values:
              arguments:
                 values: ['FX', 'Equity', 'Rates', 'Credit']
      - name: instrument_type
        description: Type of the financial instrument
        data_tests:
          - not_null          
          - accepted_values:
              arguments:
                values:
                  ['FX_FORWARD', 'EQUITY', 'CORPORATE_BOND', 'CDS']          
      - name: desk
        description: Trading desk name
        data_tests:
          - not_null
          - accepted_values:
               arguments:
                  values: ['FX Desk', 'Equity Desk', 'Rates Desk', 'Credit Desk']
      - name: direction
        description: Trade direction
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                 values: ['LONG', 'SHORT']
      - name: notional
        description: Notional value in local currency
        data_tests:
          - not_null                 
      - name: notional_usd
        description: Notional value converted to USD
        data_tests:
          - not_null
      - name: trade_date
        description: Date when trade was booked
        data_tests:
          - not_null          
      - name: maturity_date
        description: Date when trade matures
        data_tests:
          - not_null          
      - name: fx_rate_vs_usd
        description: FX rate used for USD conversion
        data_tests:
          - not_null
      - name: net_exposure_usd
        description: Signed exposure in USD — positive for LONG, negative for SHORT
        data_tests:
          - not_null
      - name: ticker
        description: Normalized ticker symbol — matches bronze.positions.ticker for joins
        data_tests:
          - not_null
      - name: isin
        description: International Securities Identification Number. Synthetic for portfolio project.
      - name: cusip
        description: CUSIP identifier. Synthetic for portfolio project.
      - name: currency
        description: Local currency of the position before USD conversion
        data_tests:
          - not_null
      - name: current_price
        description: Latest available closing price from silver.prices_cleaned. NULL if no price data exists for this ticker.
      - name: latest_price_date
        description: Date of the current_price — indicates data staleness. NULL if no price data.
      - name: market_value_usd
        description: Current market value in USD. Uses current_price if available, else falls back to notional.
        data_tests:
          - not_null
      - name: days_to_maturity
        description: Calendar days from today to maturity_date. Negative = matured position.
        data_tests:
          - not_null
      - name: direction_multiplier
        description: 1 for LONG, -1 for SHORT
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                 values: [1, -1]
      - name: _silver_loaded_at
        description: Timestamp when the row was loaded into Silver